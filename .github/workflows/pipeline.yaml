name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Cache envtest binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ./bin
          key: envtest-${{ hashFiles('go.mod') }}-${{ runner.os }}

      - name: Run Tests with Coverage
        run: TEST_ZONE_NAME=example.com. make test

      - name: Update Coverage Badge in README
        run: |
          # 1. Extract the coverage percentage from Go's coverage.txt
          # This grabs the "total:" line, picks the 3rd column, and removes the % sign
          COVERAGE=$(grep '^total:' coverage.txt | awk '{print $3}' | tr -cd '0-9.')
          echo "Extracted coverage: $COVERAGE%"

          # 2. Update the number in the README using sed
          # This finds 'badge/coverage-XX.X' and replaces the number with the new $COVERAGE
          sed -i -E "s/(badge\/coverage-)[0-9.]+/\1${COVERAGE}/" README.md

      - name: Commit and Push Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # Avoid error if nothing changed
          git commit -m "chore: update coverage badge [skip ci]" || exit 0
          git push

  build-and-push:
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ !startsWith(github.head_ref, 'dependabot/') }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=min
          tags: |
            kvalitetsit/myra-cert-manager-webhook:latest
            kvalitetsit/myra-cert-manager-webhook:${{ github.sha }}

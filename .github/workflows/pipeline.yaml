name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Cache envtest binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ./bin
          key: envtest-1.31-${{ runner.os }}

      - name: Install envtest Binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use 1.31 --bin-dir ./bin -p path

      - name: Run Tests with Coverage
        run: |
          export TEST_ASSET_ETCD=./bin/k8s/1.31.0-linux-amd64/etcd
          export TEST_ASSET_KUBE_APISERVER=./bin/k8s/1.31.0-linux-amd64/kube-apiserver
          export TEST_ASSET_KUBECTL=./bin/k8s/1.31.0-linux-amd64/kubectl
          export TEST_ZONE_NAME=example.com.
          make test

      - name: Update Coverage Badge in README
        run: |
          # 1. Extract the coverage percentage from Go's coverage.txt
          # This grabs the "total:" line, picks the 3rd column, and removes the % sign
          COVERAGE=$(grep total coverage.txt | awk '{print $3}' | sed 's/%//')
          echo "Extracted coverage: $COVERAGE%"

          # 2. Update the number in the README using sed
          # This finds 'badge/coverage-XX.X' and replaces the number with the new $COVERAGE
          sed -i -E "s/(badge\/coverage-)[0-9.]+/\1${COVERAGE}/" README.md

      - name: Commit and Push Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # Avoid error if nothing changed
          git commit -m "chore: update coverage badge [skip ci]" || exit 0
          git push

  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs:
      - test
      - version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=min
          tags: |
            kvalitetsit/myra-cert-manager-webhook:latest
            kvalitetsit/myra-cert-manager-webhook:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('kvalitetsit/myra-cert-manager-webhook:{0}', needs.version.outputs.version) || '' }}

  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-and-push
      - version
    permissions:
      contents: read
      id-token: write # Needed for chart publishing.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        name: "Setup Helm"
        with:
          version: "v3.17.0"

      - name: Update values.yaml with yq
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          yq -i '.image.tag = env(VERSION)' deploy/myra-cert-manager-webhook/values.yaml

      - name: Build Chart
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          helm package deploy/myra-cert-manager-webhook --app-version ${VERSION} --version ${VERSION}

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "development@kvalitetsit.dk"

      - name: Checkout Helm repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KvalitetsIT/helm-repo
          token: ${{ secrets.KIT_GITHUB_ACCESS }}
          path: helm-repo
          persist-credentials: true # Needed for pushing chart updates to helm-repo.

      - name: Publish chart
        env:
          TAG: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p helm-repo/myra-cert-manager-webhook
          cp myra-cert-manager-webhook-*.tgz helm-repo/myra-cert-manager-webhook/
          cd helm-repo
          helm repo index . --url https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          git add -A
          git commit -m "chore: release myra-cert-manager-webhook chart v${TAG}"
          git push

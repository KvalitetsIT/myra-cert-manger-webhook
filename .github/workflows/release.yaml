name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Cache envtest binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ./bin
          key: envtest-${{ hashFiles('go.mod') }}-${{ runner.os }}

      - name: Run Tests with Coverage
        run: TEST_ZONE_NAME=example.com. make test

  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs:
      - test
      - version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=min
          tags: |
            kvalitetsit/myra-cert-manager-webhook:latest
            kvalitetsit/myra-cert-manager-webhook:${{ github.sha }}
            kvalitetsit/myra-cert-manager-webhook:${{ needs.version.outputs.version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        name: "Setup Helm"
        with:
          version: "v3.17.0"

      - name: Update values.yaml with yq
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          yq -i '.image.tag = env(VERSION)' deploy/myra-cert-manager-webhook/values.yaml

      - name: Build Chart
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          helm package deploy/myra-cert-manager-webhook --app-version ${VERSION} --version ${VERSION}

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "development@kvalitetsit.dk"

      - name: Checkout Helm repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KvalitetsIT/helm-repo
          token: ${{ secrets.KIT_GITHUB_ACCESS }}
          path: helm-repo
          persist-credentials: true # Needed for pushing chart updates to helm-repo.

      - name: Publish chart
        env:
          TAG: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p helm-repo/myra-cert-manager-webhook
          cp myra-cert-manager-webhook-*.tgz helm-repo/myra-cert-manager-webhook/
          cd helm-repo
          helm repo index . --url https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          git add -A
          git commit -m "chore: release myra-cert-manager-webhook chart v${TAG}"
          git push

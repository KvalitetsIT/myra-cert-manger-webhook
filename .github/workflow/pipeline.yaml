name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Install envtest Binaries
        # This mirrors your Makefile setup-envtest target
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use 1.31 --bin-dir ./bin -p path

      - name: Run Tests with Coverage
        # We set the env vars required by your Makefile/Integration suite
        run: |
          export TEST_ASSET_ETCD=./bin/k8s/1.31.0-linux-amd64/etcd
          export TEST_ASSET_KUBE_APISERVER=./bin/k8s/1.31.0-linux-amd64/kube-apiserver
          export TEST_ASSET_KUBECTL=./bin/k8s/1.31.0-linux-amd64/kubectl
          export TEST_ZONE_NAME=example.com.
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out > coverage.txt

      - name: Update Coverage Badge
        # This Action looks for the [![Coverage]... link in your README and updates the %
        uses: im-open/update-badges@v3
        with:
          badges: coverage
          coverage-file: coverage.txt

      - name: Commit and Push Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # Avoid error if nothing changed
          git commit -m "chore: update coverage badge [skip ci]" || exit 0
          git push
          
  version:
    name: Resolve Version
    if: github.repository == 'KvalitetsIT/myra-cert-manger-webhook'
    runs-on: ubuntu-latest
    needs:
      - tests
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          sbom: true
          provenance: true
          tags: |
            kvalitetsit/myra-cert-manager-webhook:latest
            kvalitetsit/myra-cert-manager-webhook:${{ github.sha }}

  helm:
    name: Publish Helm Chart
    if: github.repository == 'KvalitetsIT/myra-cert-manger-webhook'
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - version
    permissions:
      contents: read
      id-token: write # Needed for chart publishing.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        name: "Setup Helm"
        with:
          version: "v3.17.0"

      - name: Update values.yaml with yq
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          yq -i '.image.tag = env(VERSION)' charts/myra-cert-manger-webhook/values.yaml

      - name: Build Chart
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |-
          sed -i "s/^version: .*/version: ${VERSION}/g" charts/myra-cert-manger-webhook/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: ${VERSION}/g" charts/myra-cert-manger-webhook/Chart.yaml
          helm package charts/myra-cert-manger-webhook

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "development@kvalitetsit.dk"

      - name: Checkout Helm repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KvalitetsIT/helm-repo
          token: ${{ secrets.KIT_GITHUB_ACCESS }}
          path: helm-repo
          persist-credentials: true # Needed for pushing chart updates to helm-repo.

      - name: Publish chart
        env:
          TAG: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p helm-repo/myra-cert-manger-webhook
          cp myra-cert-manger-webhook-*.tgz helm-repo/myra-cert-manger-webhook/
          cd helm-repo
          helm repo index . --url https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          git add -A
          git commit -m "chore: release myra-cert-manger-webhook chart v${TAG}"
          git push
